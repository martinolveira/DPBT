services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pasteleriapp
      POSTGRES_USER: pasteleri
      POSTGRES_PASSWORD: pasteleri123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pasteleri -d pasteleriapp"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
